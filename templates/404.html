{% extends "base.html" %}

{% block content %}
<div style="min-height:80vh; display:flex; align-items:center; justify-content:center; text-align:center; flex-direction:column; gap:24px;">
  <div class="glass" style="padding:64px 80px; max-width:520px; width:100%;">
    <p style="font-family:var(--f-mono); font-size:0.7rem; color:var(--cyan); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:16px;">ERROR 404</p>
    <h1 style="font-family:var(--f-display); font-size:6rem; font-weight:700; letter-spacing:-0.04em; color:var(--ink); line-height:1; margin-bottom:8px;">404</h1>
    <h2 style="font-family:var(--f-display); font-size:1.4rem; font-weight:600; color:var(--ink); margin-bottom:16px;">Page Not Found</h2>
    <p style="color:var(--ink-dim); font-size:0.95rem; line-height:1.7; margin-bottom:32px;">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <a href="/" style="display:inline-flex; align-items:center; gap:8px; font-family:var(--f-body); font-weight:600; font-size:0.88rem; padding:13px 28px; border-radius:100px; text-decoration:none; color:#04141a; background:linear-gradient(135deg,var(--cyan),#9af0ff); box-shadow:0 10px 30px -6px rgba(94,228,255,0.55); transition:transform 0.25s ease;">
      <i class="fas fa-arrow-left"></i> Back Home
    </a>
  </div>
</div>
{% endblock %}
