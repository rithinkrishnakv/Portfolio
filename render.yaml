services:
  - type: web
    name: rithin-portfolio
    runtime: python-3
    buildCommand: pip install -r requirements.txt && npm install && npm run build:css
    startCommand: gunicorn wsgi:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11
    plan: free
